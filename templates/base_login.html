{% extends "menu.html" %}

{% block title %}Área de Trabalhadores - Visreci{% endblock %}

{% block body_class %}page-login{% endblock %}

{% block content %}

<section class="py-5 mt-5 d-flex justify-content-center">
    <div class="login-card">

        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="login-badge">
                <img src="/IMG/LogoLetra.png" class="login-logo">
            </div>
            <div>
                <div class="login-title">Área de Trabalhadores</div>
                <div class="login-subtitle">Autenticação reservada</div>
            </div>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Palavra-passe</label>
                <input type="password" class="form-control" name="password" required>
            </div>

            <button type="submit" class="btn btn-warning-visreci btn-login">
                Entrar
            </button>
        </form>

        <div class="small-note mt-3 text-center">
            Área exclusiva para uso interno.
        </div>

    </div>
</section>

{% endblock %}
