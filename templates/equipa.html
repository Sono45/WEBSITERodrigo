{% extends "menu.html" %}
{% block content %}
<section class="py-5 mt-5">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-white">A Nossa Equipa</h2>
            <p class="text-warning">Especialistas prontos para ajudar a sua empresa</p>
        </div>

        <div class="row g-4 justify-content-center">
            {% for m in equipa %}
            <div class="col-lg-3 col-md-4 col-sm-6">
                <div class="team-card">
                    <div class="team-img-container">
                        {% if m['foto'] %}
                        <img src="{{ m['foto'] }}" alt="{{ m['nome'] }}">
                        {% else %}
                        <img src="/static/IMG/default-user.png" alt="Membro">
                        {% endif %}
                    </div>
                    <div class="team-info">
                        <h5 class="fw-bold m-0">{{ m['nome'] }}</h5>
                        <small class="text-warning text-uppercase">{{ m['cargo'] }}</small>
                        <p class="mt-2 text-muted small">{{ m['descricao'][:80] }}...</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
