{% extends "menu.html" %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card-glass p-4" data-aos="fade-up">
                <h3 class="text-white mb-4"><i class="bi bi-reply-fill text-warning me-2"></i>Responder a: {{ r.nome }}</h3>
                
                <div class="mb-4 p-3 bg-dark bg-opacity-50 rounded border border-secondary">
                    <p class="text-warning small mb-1 text-uppercase fw-bold">Mensagem Original:</p>
                    <p class="text-white mb-0 italic">"{{ r.mensagem }}"</p>
                </div>

                <form action="{{ url_for('responder_reclamacao', id=r.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-white-50">A sua Resposta:</label>
                        <textarea name="resposta" class="form-control bg-dark text-white border-secondary" rows="6" placeholder="Escreva aqui a solução para o cliente..." required></textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning fw-bold px-4">
                            <i class="bi bi-send-fill me-2"></i>ENVIAR RESPOSTA POR EMAIL
                        </button>
                        <a href="{{ url_for('admin_reclamacoes') }}" class="btn btn-outline-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
