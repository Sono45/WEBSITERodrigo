{% extends "menu.html" %}
{% block title %}{{ "Editar" if membro else "Novo" }} Membro | Visreci{% endblock %}

{% block content %}
<section class="py-5 mt-5">
    <div class="container" style="max-width:720px;">
        <div class="bg-white rounded-4 shadow-sm p-4">
            <h2 class="fw-bold mb-4">{{ "Editar membro" if membro else "Novo membro" }}</h2>

            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input class="form-control" name="nome" required value="{{ membro['nome'] if membro else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Cargo</label>
                    <input class="form-control" name="cargo" required value="{{ membro['cargo'] if membro else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição (opcional)</label>
                    <textarea class="form-control" name="descricao"
                        rows="3">{{ membro['descricao'] if membro else '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Foto</label>
                    <input class="form-control" type="file" name="foto" accept=".jpg,.jpeg,.png,.webp">

                    {% if membro and membro["foto"] %}
                    <div class="form-text">Foto atual:</div>
                    <img src="{{ membro['foto'] }}" style="height:70px;width:70px;object-fit:cover;border-radius:50%;">
                    {% endif %}
                </div>


                <div class="mb-4">
                    <label class="form-label">Ativo</label>
                    <select class="form-select" name="ativo">
                        <option value="1" {% if not membro or membro['ativo']==1 %}selected{% endif %}>Sim</option>
                        <option value="0" {% if membro and membro['ativo']==0 %}selected{% endif %}>Não</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success" type="submit">Guardar</button>
                    <a class="btn btn-outline-secondary" href="{{ url_for('admin_equipa') }}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
