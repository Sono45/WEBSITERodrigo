{% extends "menu.html" %}
{% block content %}
<section class="py-5 mt-5">
    <div class="container" style="max-width: 800px;">
        <div class="text-center mb-5" data-aos="fade-down">
            <h2 class="text-white fw-bold">Livro de Reclamações Eletrónico</h2>
            <div class="badge bg-warning text-dark fw-bold px-3 py-2 mb-3">VISRECI - ÁREA DO CLIENTE</div>
            <p class="text-white-50">A sua opinião ajuda-nos a melhorar a nossa gestão sustentável de resíduos.</p>
        </div>

        <div class="form-glass p-4 p-md-5" data-aos="fade-up">
            <form action="{{ url_for('reclamar') }}" method="POST">

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-warning small fw-bold text-uppercase">Nome Completo</label>
                        <input type="text" name="nome" class="form-control input-glass" required
                            placeholder="Ex: João Silva">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label text-warning small fw-bold text-uppercase">Email de Contacto</label>
                        <input type="email" name="email" class="form-control input-glass" required
                            placeholder="joao@exemplo.com">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-warning small fw-bold text-uppercase">Assunto da Reclamação</label>
                    <input type="text" name="assunto" class="form-control input-glass" required
                        placeholder="Ex: Problema na recolha de óleos">
                </div>

                <div class="mb-4">
                    <label class="form-label text-warning small fw-bold text-uppercase">Descrição Detalhada</label>
                    <textarea name="mensagem" class="form-control input-glass" rows="6" required
                        placeholder="Explique detalhadamente o que aconteceu..."></textarea>
                </div>

                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-warning fw-bold py-3 shadow">
                        <i class="bi bi-send-fill me-2"></i>SUBMETER RECLAMAÇÃO
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-link text-white-50 mt-2 text-decoration-none small">
                        Voltar ao Início
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>

<style>
    /* Reaproveitando os teus estilos de vidro */
    .form-glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .input-glass {
        background: rgba(255, 255, 255, 0.07) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        border-radius: 10px;
        padding: 12px;
    }

    .input-glass::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    .input-glass:focus {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: #ffc107 !important;
        box-shadow: 0 0 10px rgba(255, 193, 7, 0.2) !important;
    }
</style>
{% endblock %}
